<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ChoreHeroes</title>
    <script>
      // SPA on GitHub Pages: encode the requested path into a query string and
      // bounce to /index.html. The decoder in index.html restores the real URL
      // before React Router boots. Pattern from rafgraph/spa-github-pages.
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      }());
    </script>
  </head>
  <body></body>
</html>

    <!-- One-time cleanup: GitHub Pages previously served a vanilla-JS app that
         registered a service worker at /sw.js. On the first v2 visit per device
         we unregister any existing SW and reload so the new shell takes over
         cleanly. Flag prevents re-running. -->
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        if (localStorage.getItem("ch_sw_migrated_v2")) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) {
            localStorage.setItem("ch_sw_migrated_v2", "1");
            return;
          }
          Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            localStorage.setItem("ch_sw_migrated_v2", "1");
            location.reload();
          });
        });
      }());
    </script>

    <!-- SPA on GitHub Pages: 404.html re-encodes any path into a query string
         and bounces here. This decoder restores the real URL before React
         Router boots, so deep links like /family or /kid keep working. -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
